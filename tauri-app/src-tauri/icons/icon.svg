<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="220" fill="#fafaf9"/>
  
  <g fill="none" stroke="#1c1917" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Insect arm from bottom-left, multi-segmented -->
    <path d="M 60 1000 L 200 880"/>
    <circle cx="200" cy="880" r="13" fill="#1c1917"/>
    <path d="M 200 880 L 320 720"/>
    <circle cx="320" cy="720" r="13" fill="#1c1917"/>
    <path d="M 320 720 L 380 620"/>
    <circle cx="380" cy="620" r="13" fill="#1c1917"/>
    
    <!-- Memo stack -->
    <rect x="500" y="380" width="320" height="280" rx="6"/>
    <rect x="515" y="365" width="320" height="280" rx="6"/>
    <path d="M 530 350 L 530 630 L 850 630 L 850 380 L 820 350 Z"/>
    <path d="M 820 350 L 820 380 L 850 380"/>
    <line x1="570" y1="430" x2="810" y2="430" stroke-width="7"/>
    <line x1="570" y1="480" x2="810" y2="480" stroke-width="7"/>
    <line x1="570" y1="530" x2="760" y2="530" stroke-width="7"/>
    
    <!-- Palm -->
    <path d="M 380 620 Q 430 600 470 600"/>
    
    <!-- Thumb across front of stack -->
    <path d="M 380 620 Q 410 580 440 540 Q 470 500 510 470"/>
    <circle cx="450" cy="525" r="7" fill="#1c1917"/>
    
    <!-- Index finger -->
    <path d="M 420 610 Q 460 580 510 560 Q 540 550 560 540"/>
    <circle cx="490" cy="565" r="7" fill="#1c1917"/>
    
    <!-- Middle finger -->
    <path d="M 460 615 Q 500 605 540 600"/>
    <circle cx="510" cy="608" r="7" fill="#1c1917"/>
    
    <!-- Ring finger -->
    <path d="M 490 625 Q 525 625 555 625"/>
    <circle cx="525" cy="625" r="6" fill="#1c1917"/>
    
    <!-- Insect spines -->
    <path d="M 270 800 L 295 775" stroke-width="7"/>
    <path d="M 350 660 L 372 640" stroke-width="7"/>
  </g>
  
  <g fill="#1c1917">
    <path d="M 200 360 L 206 380 L 226 386 L 206 392 L 200 412 L 194 392 L 174 386 L 194 380 Z"/>
  </g>
</svg>
