name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'core/**'
              - 'mcp-cli/**'
              - 'tauri-app/src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust/justfile'
      - if: steps.filter.outputs.rust == 'true' || github.event_name != 'pull_request'
        uses: nixbuild/nix-quick-install-action@v34
      - if: steps.filter.outputs.rust == 'true' || github.event_name != 'pull_request'
        uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: check
        if: steps.filter.outputs.rust == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just rust::check
      - name: test
        if: steps.filter.outputs.rust == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just rust::test
    timeout-minutes: 15

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'tauri-app/src/**'
              - 'tauri-app/package.json'
              - 'tauri-app/pnpm-lock.yaml'
              - 'tauri-app/tsconfig.json'
              - 'tauri-app/vite.config.ts'
              - 'tauri-app/vitest.config.ts'
              - 'tauri-app/justfile'
      - if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        uses: nixbuild/nix-quick-install-action@v34
      - if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: setup playwright browsers
        if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        run: |
          path=$(nix build nixpkgs#playwright-driver.browsers --no-link --print-out-paths)
          echo "PLAYWRIGHT_BROWSERS_PATH=$path" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1" >> "$GITHUB_ENV"
      - name: check
        if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just tauri_app::check
      - name: test
        if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just tauri_app::test
    timeout-minutes: 15

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix fmt -- --fail-on-change
    timeout-minutes: 5
