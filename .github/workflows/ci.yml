name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - 'tauri-app/src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust/justfile'
      - name: Free disk space
        if: steps.filter.outputs.core == 'true' || github.event_name != 'pull_request'
        uses: jlumbroso/free-disk-space@v2
        with:
          tool-cache: false
          large-packages: false
      - if: steps.filter.outputs.core == 'true' || github.event_name != 'pull_request'
        uses: nixbuild/nix-quick-install-action@v34
      - if: steps.filter.outputs.core == 'true' || github.event_name != 'pull_request'
        uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: check
        if: steps.filter.outputs.core == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just rust::check-core
      - name: test
        if: steps.filter.outputs.core == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just rust::test-core
    timeout-minutes: 15

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            cli:
              - 'core/**'
              - 'mcp-cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust/justfile'
      - if: steps.filter.outputs.cli == 'true' || github.event_name != 'pull_request'
        uses: nixbuild/nix-quick-install-action@v34
      - if: steps.filter.outputs.cli == 'true' || github.event_name != 'pull_request'
        uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: check
        if: steps.filter.outputs.cli == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just rust::check-cli
      - name: test
        if: steps.filter.outputs.cli == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just rust::test-cli
    timeout-minutes: 15

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            frontend:
              - 'tauri-app/src/**'
              - 'tauri-app/package.json'
              - 'tauri-app/pnpm-lock.yaml'
              - 'tauri-app/tsconfig.json'
              - 'tauri-app/vite.config.ts'
              - 'tauri-app/vitest.config.ts'
              - 'tauri-app/justfile'
      - if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        uses: nixbuild/nix-quick-install-action@v34
      - if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: check
        if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just tauri_app::check
      - name: test
        if: steps.filter.outputs.frontend == 'true' || github.event_name != 'pull_request'
        run: nix develop --command just tauri_app::test
    timeout-minutes: 15

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - run: nix fmt -- --fail-on-change
    timeout-minutes: 5
